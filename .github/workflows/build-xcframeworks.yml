name: Build Mapbox Navigation xcframeworks

# Manual trigger only — this is a one-time (or per-Mapbox-version) build,
# not something that needs to run on every push. Runs on a free GitHub-hosted
# macOS runner (macOS runners are free & unlimited for public repositories).
on:
  workflow_dispatch:
    inputs:
      mapbox_nav_version:
        description: 'mapbox-navigation-ios version tag (e.g. 3.8.2)'
        required: true
        default: '3.8.2'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # GitHub officially documents macos-15 + Xcode 16.4 as the
      # recommended, fully-supported pairing (Xcode 26.x on macos-15 has an
      # open, currently-unresolved bug as of writing — see
      # actions/runner-images#13743, broken Xcode symlinks causing
      # "cannot be located" / "No such file or directory" errors on
      # internal SDK/tool paths). "latest-stable" picked Xcode 26.3 and hit
      # exactly that bug, so we pin explicitly instead.
      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Verify Xcode selection
        run: |
          xcodebuild -version
          xcode-select -p

      # A freshly `xcode-select`-switched Xcode version can leave some
      # internal components (like direct invocations of the low-level
      # xcbuild binary, as opposed to going through the xcodebuild CLI
      # wrapper) unregistered/unactivated. `-runFirstLaunch` is the
      # documented way to finish first-time setup for a given Xcode
      # install without a GUI. Worth trying since `xcodebuild -version`
      # already succeeds fine (proving Xcode itself is fine) while direct
      # xcbuild subprocess spawning consistently fails — suggesting
      # something in between those two paths isn't fully set up.
      - name: Run Xcode first-launch tasks
        run: |
          sudo xcodebuild -license accept
          sudo xcodebuild -runFirstLaunch

      - name: Configure Mapbox downloads credentials
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          if [ -z "$MAPBOX_DOWNLOADS_TOKEN" ]; then
            echo "::error::MAPBOX_DOWNLOADS_TOKEN secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          cat > ~/.netrc << EOF
          machine api.mapbox.com
          login mapbox
          password $MAPBOX_DOWNLOADS_TOKEN
          EOF
          chmod 600 ~/.netrc

      # The build step below is wrapped in an automatic retry. The failure
      # pattern we've observed (getting progressively further each run,
      # failing on a DIFFERENT target each time, always near the end of
      # the build) points to intermittent resource pressure on this free
      # runner rather than a deterministic blocker — so simply retrying
      # has a real chance of succeeding without any code change.
      # nest's own docs: "Fetching releases sometimes fails due to API
      # limit, so we recommended to pass a GitHub API token." GITHUB_TOKEN
      # is automatically provided by Actions — passing it as GH_TOKEN
      # raises nest's GitHub API limit from 60/hour (unauthenticated,
      # shared across all runners using the same egress IP) to a much
      # higher authenticated limit, avoiding a new class of flaky failure.
      - name: Run build-xcframeworks.sh (with retry)
        uses: nick-fields/retry@v3
        env:
          MAPBOX_NAV_VERSION: ${{ inputs.mapbox_nav_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            chmod +x ios/build-xcframeworks.sh
            ./ios/build-xcframeworks.sh

      - name: Verify frameworks were produced
        run: |
          ls -la ios/Frameworks/
          test -d "ios/Frameworks/MapboxNavigationCore.xcframework" || { echo "::error::MapboxNavigationCore.xcframework missing"; exit 1; }
          test -d "ios/Frameworks/MapboxNavigationUIKit.xcframework" || { echo "::error::MapboxNavigationUIKit.xcframework missing"; exit 1; }
          test -d "ios/Frameworks/MapboxNavigationNative.xcframework" || { echo "::error::MapboxNavigationNative.xcframework missing"; exit 1; }

      - name: Upload frameworks as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapbox-navigation-xcframeworks-${{ inputs.mapbox_nav_version }}
          path: ios/Frameworks/
          retention-days: 30

      - name: Commit frameworks to a branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="xcframeworks/${{ inputs.mapbox_nav_version }}"
          git checkout -b "$BRANCH"
          git add -f ios/Frameworks/
          git commit -m "Build xcframeworks for mapbox-navigation-ios ${{ inputs.mapbox_nav_version }}"
          git push origin "$BRANCH" --force
          echo "::notice::Pushed to branch $BRANCH — open a PR or merge it, then npm pack/publish from that branch."
